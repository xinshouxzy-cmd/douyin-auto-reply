name: Build Windows Package

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Chrome
        run: |
          choco install googlechrome -y

      - name: Install Python deps
        run: |
          pip install pyinstaller selenium webdriver-manager

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --windowed --name "抖音自动回复" --add-data "config.json;." --collect-all selenium --hidden-import selenium.webdriver.chrome.webdriver --hidden-import webdriver_manager auto_reply_gui.py

      - name: Copy chromedriver
        run: |
          python -c "from webdriver_manager.chrome import ChromeDriverManager; import shutil; path = ChromeDriverManager().install(); shutil.copy(path, r'dist\抖音自动回复\chromedriver.exe')"

      - name: Create zip
        run: |
          Compress-Archive -Path "dist\抖音自动回复\*" -DestinationPath "抖音自动回复_v4.zip"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 抖音自动回复_v4
          path: 抖音自动回复_v4.zip
