name: Build Windows Package

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          pip install pyinstaller selenium webdriver-manager

      - name: Get chromedriver
        run: |
          python -c "from webdriver_manager.chrome import ChromeDriverManager; p = ChromeDriverManager().install(); print('DRIVER at:', p); import shutil; shutil.copy(p, 'chromedriver.exe')"

      - name: Build
        run: |
          pyinstaller --onedir --windowed --name "抖音自动回复" --add-data "config.json;." --add-data "chromedriver.exe;." --collect-all selenium --hidden-import selenium.webdriver.chrome.webdriver --hidden-import webdriver_manager auto_reply_gui.py

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\抖音自动回复\*" -DestinationPath "抖音自动回复_v6.zip"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 抖音自动回复_v6
          path: 抖音自动回复_v6.zip
