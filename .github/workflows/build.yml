name: Build Self-contained Package

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps + Playwright browser
        run: |
          pip install pyinstaller playwright
          python -m playwright install chromium

      - name: Build EXE
        run: |
          pyinstaller --onedir --windowed --name "抖音自动回复" --add-data "config.json;." --collect-all playwright auto_reply_gui.py

      - name: Copy Playwright browser into dist
        run: |
          $pwCache = "$env:USERPROFILE\AppData\Local\ms-playwright"
          if (Test-Path $pwCache) {
            Copy-Item -Path $pwCache -Destination "dist\抖音自动回复\ms-playwright" -Recurse
          } else {
            Write-Error "Playwright browsers not found"
          }

      - name: Package
        run: |
          Compress-Archive -Path "dist\抖音自动回复\*" -DestinationPath "抖音自动回复_完整包.zip"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: 抖音自动回复_完整包
          path: 抖音自动回复_完整包.zip
