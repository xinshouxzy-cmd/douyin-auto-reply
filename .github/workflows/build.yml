name: Build Windows Package

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyinstaller selenium

      - name: Download chromedriver
        run: |
          $chromeVersion = (Get-Item "C:\Program Files\Google\Chrome\Application\chrome.exe").VersionInfo.ProductVersion
          Write-Host "Chrome version: $chromeVersion"
          $majorVersion = $chromeVersion.Split('.')[0]
          $url = "https://storage.googleapis.com/chrome-for-testing-public/$($majorVersion).0.0/win64/chromedriver-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile chromedriver.zip
          Expand-Archive chromedriver.zip -DestinationPath .
          move "chromedriver-win64\chromedriver.exe" chromedriver.exe

      - name: Build with PyInstaller (onedir)
        run: |
          pyinstaller --onedir --windowed --name "抖音自动回复" --add-data "config.json;." --collect-all selenium --hidden-import selenium.webdriver.chrome.webdriver --hidden-import selenium.webdriver.common.by --hidden-import selenium.webdriver.support.ui --hidden-import selenium.webdriver.support.expected_conditions --hidden-import selenium.common.exceptions --hidden-import tkinter --hidden-import json --hidden-import threading --hidden-import time auto_reply_gui.py

      - name: Copy files to dist folder
        run: |
          copy chromedriver.exe dist\抖音自动回复\
          copy config.json dist\抖音自动回复\

      - name: Create ZIP package
        run: |
          Compress-Archive -Path "dist\抖音自动回复\*" -DestinationPath "抖音自动回复_完整包.zip"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: 抖音自动回复_完整包
          path: 抖音自动回复_完整包.zip
